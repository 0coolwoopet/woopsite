<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>woopsite</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #23272a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .discord-button {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      background-color: #5865F2;
      color: #ffffff;
      text-decoration: none;
      font-size: 18px;
      font-weight: 600;
      border-radius: 8px;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }

    .discord-button:hover {
      background-color: #4752C4;
    }

    .discord-button:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>

  <a class="discord-button" href="https://discord.gg/jtJ5v2MVZV" target="_blank" rel="noopener noreferrer">
    Join our Discord
  </a>

</body>
</html>
