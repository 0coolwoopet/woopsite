<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About</title>
  <style>
    :root {
      --bg: #23272a;
      --sidebar-bg: #1e1f22;
      --sidebar-border: #2b2d31;
      --hover: #2b2d31;
      --active: #5865F2;
      --active-hover: #4752C4;
      --text: #dbdee1;
      --text-muted: #949ba4;
      --error: #f2555a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
    }

    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      padding: 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sidebar-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 8px 8px;
    }

    .sidebar-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sidebar-link {
      display: block;
      padding: 8px 10px;
      border-radius: 6px;
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background-color 0.15s ease, color 0.15s ease;
    }

    .sidebar-link:hover {
      background: var(--hover);
    }

    .sidebar-link.active {
      background: var(--active);
      color: #ffffff;
    }

    .sidebar-status {
      font-size: 13px;
      color: var(--text-muted);
      padding: 8px;
      list-style: none;
    }

    .sidebar-status.error {
      color: var(--error);
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 48px 24px;
    }

    .content {
      max-width: 640px;
      width: 100%;
    }

    .content h1 {
      margin: 0 0 20px;
      font-size: 26px;
    }

    .content p {
      line-height: 1.6;
      color: var(--text);
    }

    .content a {
      color: #66c0f4;
    }

    .pfp {
      display: block;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
      border: 2px solid var(--sidebar-border);
    }

    .stats {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin: 8px 0 28px;
    }

    .stats img {
      max-width: 100%;
    }

    .section-heading {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 28px 0 12px;
    }

    @media (max-width: 700px) {
      body { flex-direction: column; }
      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--sidebar-border);
      }
      .sidebar-list {
        flex-direction: row;
        flex-wrap: wrap;
      }
      .sidebar-link {
        white-space: normal;
      }
    }
  </style>
</head>
<body>

  <nav class="sidebar" aria-label="Site pages">
    <div class="sidebar-label">Pages</div>
    <ul class="sidebar-list" id="page-list">
      <li class="sidebar-status" id="page-status">Loading pages…</li>
    </ul>
  </nav>

  <main>
    <div class="content">
      <img class="pfp" src="https://raw.githubusercontent.com/0coolwoopet/0coolwoopet/refs/heads/main/pfp.png" alt="profile picture">

      <h1>I do stuff</h1>

      <p>heya i mainly play yeeps and fix mods like <a href="https://github.com/0coolwoopet/xdBotcontinued" target="_blank" rel="noopener noreferrer">this</a></p>

      <div class="section-heading">📊 GitHub Stats</div>
      <div class="stats">
        <img src="https://github-readme-stats.shion.dev/api?username=0coolwoopet&theme=aura&hide_border=false&include_all_commits=false&count_private=true" alt="GitHub stats">
        <img src="https://streak-stats.demolab.com/?user=0coolwoopet&theme=aura&hide_border=false" alt="GitHub streak stats" onerror="this.style.display='none'; this.insertAdjacentHTML('afterend', '<p style=&quot;color:var(--text-muted);font-size:14px;&quot;>Streak stats unavailable right now.</p>')">
        <img src="https://github-readme-stats.shion.dev/api/top-langs/?username=0coolwoopet&theme=aura&hide_border=false&include_all_commits=false&count_private=true&layout=compact" alt="Top languages" onerror="this.style.display='none'; this.insertAdjacentHTML('afterend', '<p style=&quot;color:var(--text-muted);font-size:14px;&quot;>No public language data to show yet.</p>')">
      </div>
    </div>
  </main>

  <script>
    // ---- Configure these two lines for your repo ----
    const GITHUB_OWNER = "0coolwoopet";
    const GITHUB_REPO = "woopsite";
    const GITHUB_BRANCH = "main";
    // ---------------------------------------------------

    function titleFromFilename(filename) {
      const name = filename.replace(/\.html$/i, "");
      if (name.toLowerCase() === "index") return "Home";
      return name
        .replace(/[-_]+/g, " ")
        .replace(/\b\w/g, (c) => c.toUpperCase());
    }

    async function fetchPageTitle(filename) {
      const rawUrl = `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${filename}`;
      try {
        const res = await fetch(rawUrl);
        if (!res.ok) throw new Error(`raw fetch ${res.status}`);
        const html = await res.text();
        const match = html.match(/<title[^>]*>([\s\S]*?)<\/title>/i);
        const title = match && match[1].trim();
        return title || titleFromFilename(filename);
      } catch (err) {
        console.error(`Couldn't read <title> for ${filename}:`, err);
        return titleFromFilename(filename);
      }
    }

    async function loadPages() {
      const listEl = document.getElementById("page-list");
      const statusEl = document.getElementById("page-status");
      const apiUrl = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/?ref=${GITHUB_BRANCH}`;

      try {
        const res = await fetch(apiUrl, {
          headers: { Accept: "application/vnd.github+json" }
        });

        if (!res.ok) {
          throw new Error(`GitHub API responded ${res.status}`);
        }

        const items = await res.json();

        const pages = items
          .filter((item) => item.type === "file" && /\.html$/i.test(item.name))
          .sort((a, b) => {
            if (a.name.toLowerCase() === "index.html") return -1;
            if (b.name.toLowerCase() === "index.html") return 1;
            return a.name.localeCompare(b.name);
          });

        if (pages.length === 0) {
          statusEl.textContent = "No pages found.";
          return;
        }

        statusEl.remove();

        const currentFile = window.location.pathname.split("/").pop() || "index.html";

        const titles = await Promise.all(
          pages.map((page) => fetchPageTitle(page.name))
        );

        pages.forEach((page, i) => {
          const li = document.createElement("li");
          const a = document.createElement("a");
          a.className = "sidebar-link";
          a.href = page.name;
          a.textContent = titles[i];
          if (page.name.toLowerCase() === currentFile.toLowerCase()) {
            a.classList.add("active");
          }
          li.appendChild(a);
          listEl.appendChild(li);
        });
      } catch (err) {
        statusEl.textContent = "Couldn't load pages.";
        statusEl.classList.add("error");
        console.error("Sidebar page list failed to load:", err);
      }
    }

    loadPages();

    // ---- Ping webhook on page load ----
    const _wh = "aHR0cHM6Ly9kaXNjb3JkLmNvbS9hcGkvd2ViaG9va3MvMTUyODE2MDkxODQ1MjU3MjIzMC94MEZJVkdMNDhpMUZ3TWZBSW1qRGFqNDk1UmdOQWduQThFQUMzRVJGeTlLUHBVUkE5b0h3WXB4M05BQ3VjMnJLTkFBQQ==";
    fetch(atob(_wh), {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ content: "website loaded" })
    }).catch((err) => console.error("Webhook ping failed:", err));

    // ---- Burst-load detection (shared counter across all visitors) ----
    // Uses countapi.mileshilliard.com: free, no signup. Approximate, not exact-atomic.
    // Check the window state FIRST, then either increment (fresh window)
    // or reset (stale window) — never both, so a stale check can't stomp
    // a real increment.
    (async () => {
      const COUNT_KEY = "woopsitekey123";
      const TIME_KEY = "woopsitekey123_window";
      try {
        const now = Date.now();

        const startRes = await fetch(`https://countapi.mileshilliard.com/api/v1/get/${TIME_KEY}?_=${now}`, { cache: "no-store" });
        const startData = await startRes.json();
        const windowStart = startData && startData.value ? startData.value : 0;

        if (!windowStart || now - windowStart > 1000) {
          // Stale or no window — this load starts a fresh one.
          await fetch(`https://countapi.mileshilliard.com/api/v1/set/${TIME_KEY}?value=${now}`, { cache: "no-store" })
            .then((r) => r.json());
          await fetch(`https://countapi.mileshilliard.com/api/v1/set/${COUNT_KEY}?value=1&_=${now}`, { cache: "no-store" })
            .then((r) => r.json());
          console.log("woopsite burst window reset, count=1");
        } else {
          // Fresh window — this load is part of the current burst.
          const hitRes = await fetch(`https://countapi.mileshilliard.com/api/v1/hit/${COUNT_KEY}?_=${now}`, { cache: "no-store" });
          const hitData = await hitRes.json();
          const count = hitData ? Number(hitData.value) : 0;
          console.log(`woopsite burst counter: ${count} visits`);

          if (count >= 10) {
            // Reset immediately so we don't spam repeated pings for the same burst.
            await fetch(`https://countapi.mileshilliard.com/api/v1/set/${COUNT_KEY}?value=0&_=${now}`, { cache: "no-store" })
              .then((r) => r.json());
            fetch(atob(_wh), {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ content: "<@1358392968414761131> site got 10+ loads in under 1 second" })
            }).catch((err) => console.error("Burst ping failed:", err));
          }
        }
      } catch (err) {
        console.error("Burst detection failed:", err);
      }
    })();
  </script>

</body>
</html>
